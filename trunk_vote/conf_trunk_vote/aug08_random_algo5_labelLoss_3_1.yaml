# Track-2 trunk-vote multi-crop training

data:
  atadd_t2_train_audio: /data/liulan/workspace/dataset/at_add_track2/train
  atadd_t2_train_label: /data/liulan/workspace/dataset/at_add_track2/labels/train.csv
  atadd_t2_dev_audio: /data/liulan/workspace/dataset/at_add_track2/dev
  atadd_t2_dev_label: /data/liulan/workspace/dataset/at_add_track2/labels/dev.csv
  atadd_t2_eval_audio: /data/liulan/workspace/dataset/at_add_track2/eval

ssl:
  xlsr: /data/liulan/workspace/huggingface/wav2vec2-xls-r-300m
  beats: /data/liulan/workspace/huggingface/BEATs_iter3
  # XLSR multi-layer readout (optional; only affects the XLSR branch):
  xlsr_selected_layers: [3, 11, 24]
  xlsr_layer_fusion: cat_proj_v1
  # BEATs multi-layer readout (optional; 0=encoder input, 1..12=transformer layers):
  beats_selected_layers: [3, 6, 9]
  beats_layer_fusion: cat_proj_v1

ssl_backbone: xlsr_beats

# For fused dual-SSL experts, optional backbone_dim overrides fused AASIST in_dim (default 1024).
train_task: atadd-track2

# Routing loss weights
specialist_weight: 0.05
total_weight: 0.95
freeze_backbone: false

filter_types:
out_fold: ./ckpt_t2_trunk_vote/trunk_vote_v1

# Data augmentation
aug:
  aug_speech: 0.0
  aug_sound: 0.8
  aug_singing: 0.2
  sound_aug_methods: [rawboost]
  aug_music: 0.0
  music_aug_method: spec_augment

# Training
num_epochs: 100
batch_size: 24
lr: 0.000001
lr_decay: 0.5
interval: 2
num_workers: 4
seed: 1234
audio_len: 64600
continue_training: false

# Evaluation
eval_steps: 1000
full_eval_steps: 6000
eval_warmup_steps: 6000
patience: 20
save_best_by: f1
eval_threshold_mode: fixed
score_threshold: 0.5
eval_strategy: total
