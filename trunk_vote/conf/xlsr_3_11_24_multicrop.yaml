data:
  atadd_t1_train_audio: /root/autodl-fs/track1/train
  atadd_t1_train_label: /root/autodl-fs/track1/label/train.csv
  atadd_t1_dev_audio: /root/autodl-fs/track1/dev
  atadd_t1_dev_label: /root/autodl-fs/track1/label/dev.csv
  atadd_t1_eval_audio: /root/autodl-fs/track1/eval
ssl:
  xlsr: /root/autodl-fs/models/wav2vec2-xls-r-300m
  wavlm: /root/autodl-fs/models/wavlm-large
  beats: /root/autodl-fs/models/BEATs_iter3
  selected_layers:
  - 3
  - 11
  - 24
  layer_fusion: cat_proj_v1

train_task: atadd-track1
out_fold: ./ckpt_t1_trunk_vote/xlsr_3_11_24_multicrop
model: ft-w2v2aasist
fusion: # cat_linear
filter_types: speech
assist_project_choice: 2

aug:
  aug_speech: 0.2
  aug_sound: 0.0
  aug_singing: 0.0
  aug_music: 0.0
  speech_aug_method: codec
  speech_rawboost_algo: 5

lr:             1.0e-06
lr_decay:       0.5
interval:       2
num_workers:    4
save_best_by:   loss
eval_threshold_mode: fixed
score_threshold: 0.5

num_epochs:         100
batch_size:         24
eval_steps:         1000
full_eval_steps:    6000
eval_warmup_steps:  6000
patience:           20