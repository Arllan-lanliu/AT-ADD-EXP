# Track-2 multi-head XLSR training

data:
  atadd_t2_train_audio: /root/autodl-fs/track2/AT-ADD_T2_train.tar
  atadd_t2_train_label: /root/autodl-fs/track2/label/train.csv
  atadd_t2_dev_audio: /root/autodl-fs/track2/AT-ADD_T2_dev.tar
  atadd_t2_dev_label: /root/autodl-fs/track2/label/dev.csv
  atadd_t2_eval_audio: /root/autodl-fs/track2/eval

ssl:
  xlsr: /root/autodl-fs/models/wav2vec2-xls-r-300m
  beats: /root/autodl-fs/models/BEATs_iter3
  # XLSR multi-layer readout (optional; only affects the XLSR branch):
  xlsr_selected_layers: [3, 11, 24]
  xlsr_layer_fusion: cat_proj_v1   # last | cat_proj_v1 | cat_proj_v2 | cat_linear | mean | weight_sum
  # BEATs multi-layer readout (optional; 0=encoder input, 1..12=transformer layers):
  beats_selected_layers: [3, 6, 9]
  beats_layer_fusion: cat_proj_v1   # last | cat_proj_v1 | cat_proj_v2 | cat_linear | mean | weight_sum

ssl_backbone: xlsr_beats   # xlsr | beats | xlsr_beats (alias: dual); dual uses ssl.xlsr + ssl.beats + cat_linear

# For fused dual-SSL experts, optional backbone_dim overrides fused AASIST in_dim (default 1024).
train_task: atadd-track2

# Routing loss weights
specialist_weight: 0.05  # ← 降低，因为 music 数据少
total_weight: 0.95       # ← 提高，让 total head 更强
freeze_backbone: false

filter_types:  # 留空表示使用所有类型
out_fold: ./ckpt_t2_multi_head_layer/xslrbeats_xlsr3_11_24

# Data augmentation (针对少数类)
aug:
  aug_speech: 0.0
  aug_sound: 0.8
  aug_singing: 0.2
  aug_music: 0.0       
  music_aug_method: spec_augment

# Training
num_epochs: 100
batch_size: 24         
lr: 0.000001           
lr_decay: 0.5
interval: 2           
num_workers: 4
seed: 1234
audio_len: 64600
continue_training: false

# Evaluation
eval_steps: 1000          
full_eval_steps: 6000     
eval_warmup_steps: 6000
patience: 20
save_best_by: f1
eval_threshold_mode: fixed
score_threshold: 0.5
eval_strategy: total
