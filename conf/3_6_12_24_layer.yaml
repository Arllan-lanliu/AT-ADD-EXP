# Speech aug: ffmpeg encode→decode round-trip (MP3 / Opus / AAC / GSM-FR).

data:
  atadd_t1_train_audio: /data/liulan/workspace/dataset/at_add_track2/train
  atadd_t1_train_label: /data/liulan/workspace/dataset/at_add_track2/labels/train.csv
  atadd_t1_dev_audio:   /data/liulan/workspace/dataset/at_add_track2/dev
  atadd_t1_dev_label:   /data/liulan/workspace/dataset/at_add_track2/labels/dev.csv
  atadd_t1_eval_audio:  /data/liulan/workspace/dataset/at_add_track1/eval_t1

ssl:
  xlsr:  /data/liulan/workspace/huggingface/wav2vec2-xls-r-300m
  wavlm: /data/liulan/workspace/huggingface/wavlm-large
  mert:  /data/liulan/workspace/huggingface/MERT-v1-330M
  beats: /data/liulan/workspace/huggingface/BEATs_iter3
  clap:  /data/liulan/workspace/huggingface/larger_clap_music_and_speech  
  # XLSR multi-layer readout (ignored by non-XLSR frontends):
  selected_layers: [3, 6, 12, 24]     # e.g. [8, 16, 24]; required if layer_fusion is cat | mean
  layer_fusion: cat       # last | cat | mean

filter_types: speech
train_task: atadd-track1
out_fold: ./ckpt_t1_aug/xlsr_grkan_loss_codec02_3_6_12_24_layer

model: ft-w2v2aasist
save_best_by: loss
assist_project_choice: 2

aug:
  aug_speech: 0.2
  speech_aug_method: codec

num_epochs:  100
batch_size:  24
lr:          0.000001
lr_decay:    0.5
interval:    2
num_workers: 4

eval_steps:        1000
full_eval_steps:   6000
eval_warmup_steps: 6000
patience:          20
