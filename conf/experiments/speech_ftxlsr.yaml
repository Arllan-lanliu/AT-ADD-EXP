# ── Data paths ────────────────────────────────────────────────────────────────
data:
  # Track 2
  atadd_t2_train_audio: /data7/tyx/dataset/at_add_track2/train
  atadd_t2_train_label: /data7/tyx/dataset/at_add_track2/label/train.csv
  atadd_t2_dev_audio:   /data7/tyx/dataset/at_add_track2/dev
  atadd_t2_dev_label:   /data7/tyx/dataset/at_add_track2/label/dev.csv
  atadd_t2_eval_audio:  /data7/tyx/dataset/at_add_track2/eval


# ── SSL model paths ───────────────────────────────────────────────────────────
ssl:
  xlsr:  /data7/tyx/huggingface/wav2vec2-xls-r-300m
  wavlm: /data7/tyx/huggingface/wavlm-large
  mert:  /data7/tyx/huggingface/MERT-v1-330M
  beats: /data7/tyx/huggingface/BEATs_iter3
  clap:  /data7/tyx/huggingface/larger_clap_music_and_speech


# ── Task & output ─────────────────────────────────────────────────────────────
filter_types: speech   # Omit or empty = use all types.
train_task: atadd-track2
model: ft-w2v2aasist
#fusion: add                  # sed for dual-SSL models
save_best_by: f1             # loss | eer | f1
out_fold: ./ckpt_t2/speech_ftxlsr_f1_dynamic_eer

# ── Audio augmentation (all disabled by default) ──────────────────────────────
aug:
  aug_speech:          0.0
  aug_sound:           0.0
  aug_singing:         0.0
  aug_music:           0.0
  music_aug_method:    spec_augment   # pitch_shift | spec_augment

# ── Training hyperparameters ──────────────────────────────────────────────────
num_epochs:  100
batch_size:  24
lr:          0.000001
lr_decay:    0.5
interval:    2
num_workers: 4

# ── Evaluation schedule ───────────────────────────────────────────────────────
eval_steps:        200    # sample-dev eval every N steps
full_eval_steps:   2000   # full-dev eval every N steps
eval_warmup_steps: 2000   # skip all evals for the first N global steps
patience:          80

# ── Validation decision threshold (for F1 / per-type F1 in logs) ─────────────
# fixed: use score_threshold (real if score >= threshold, else fake)
# eer:   use EER operating threshold on the current dev loader each eval
eval_threshold_mode: eer

# Inference (eval set) with dev-calibrated EER threshold — first score dev audio, then:
#   python scripts/inference.py --model_path ./ckpt_t2/speech_ftxlsr_f1 --eval_threshold_mode eer \
#       --val_score_file ./ckpt_t2/speech_ftxlsr_f1/result/atadd-track2_logits_dev.csv \
#       --eval_audio /path/to/at_add_track2/eval



