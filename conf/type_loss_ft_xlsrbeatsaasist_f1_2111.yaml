# ── Data paths ────────────────────────────────────────────────────────────────
data:
  # Track 2
  atadd_t2_train_audio: /home/new_disk/liulan/workspace/dataset/at_add_track2/train
  atadd_t2_train_label: /home/new_disk/liulan/workspace/dataset/at_add_track2/labels/train.csv
  atadd_t2_dev_audio:   /home/new_disk/liulan/workspace/dataset/at_add_track2/dev
  atadd_t2_dev_label:   /home/new_disk/liulan/workspace/dataset/at_add_track2/labels/dev.csv
  atadd_t2_eval_audio:  /home/new_disk/liulan/workspace/dataset/at_add_track2/eval

# ── SSL model paths ───────────────────────────────────────────────────────────
ssl:
  xlsr:  /home/new_disk/liulan/workspace/otherfiles/huggingface/wav2vec2-xls-r-300m
  wavlm: /home/new_disk/liulan/workspace/otherfiles/huggingface/wavlm-large
  mert:  /home/new_disk/liulan/workspace/otherfiles/huggingface/MERT-v1-330M
  beats: /home/new_disk/liulan/workspace/otherfiles/huggingface/BEATs_iter3
  clap:  /home/new_disk/liulan/workspace/otherfiles/huggingface/larger_clap_music_and_speech

# ── Task & output ─────────────────────────────────────────────────────────────
#filter_types: speech   # Omit or empty = use all types.
train_task: atadd-track2
model: ft-xlsrbeatsaasist
#fusion: add                  # sed for dual-SSL models
save_best_by: f1             # loss | eer | f1
out_fold: ./ckpt_t2_type_loss/ft-xlsrbeatsaasist_f1_2111

ce_type_sample_weights: "0:2,1:1,2:1,3:1"

# ── Audio augmentation (all disabled by default) ──────────────────────────────
aug:
  aug_speech:          0.0
  aug_sound:           0.8
  aug_singing:         0.2
  aug_music:           0.0
  music_aug_method:    spec_augment   # pitch_shift | spec_augment

# ── Training hyperparameters ──────────────────────────────────────────────────
num_epochs:  100
batch_size:  12
gradient_accumulation_steps: 2
# ── Evaluation schedule ───────────────────────────────────────────────────────
eval_steps:        2000    # sample-dev eval every N steps
full_eval_steps:   12000   # full-dev eval every N steps
eval_warmup_steps: 12000   # skip all evals for the first N global steps
patience:          20



